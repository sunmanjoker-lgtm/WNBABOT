name: Daily WNBA Predictions
on:
  schedule:
    - cron: '0 15 * * *'   # 18:00 МСК (15:00 UTC)
    - cron: '59 20 * * *'  # 23:59 МСК (20:59 UTC)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python wnba_bot.py
