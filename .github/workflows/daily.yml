name: Daily WNBA Predictions
on:
  schedule:
    - cron: '0 3 * * *'    # 06:00 МСК (03:00 UTC) — сразу после пробуждения
    - cron: '0 11 * * *'   # 14:00 МСК (11:00 UTC) — дневной
    - cron: '0 17 * * *'   # 20:00 МСК (17:00 UTC) — перед сном
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python wnba_bot.py
